apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: ai-scraping-defense-mcp
  namespace: ai-defense
spec:
  podSelector:
    matchLabels:
      app: ai-scraping-defense-mcp
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ai-defense
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: default
      ports:
        - protocol: TCP
          port: 8085
  egress:
    # Allow DNS
    - ports:
        - protocol: UDP
          port: 53
    # Allow Redis
    - ports:
        - protocol: TCP
          port: 6379
    # Allow PostgreSQL
    - ports:
        - protocol: TCP
          port: 5432
    # Allow OTLP
    - ports:
        - protocol: TCP
          port: 4317
