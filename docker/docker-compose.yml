version: "3.9"

services:
  mcp:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    image: ai-scraping-defense-mcp:local
    container_name: ai-scraping-defense-mcp
    restart: unless-stopped
    ports:
      - "8085:8085"
    environment:
      - MCP__HOST=0.0.0.0
      - MCP__PORT=8085
      - LOG_LEVEL=info
      - AUTH_TOKENS=replace_me_with_a_strong_token
      - MCP__REDIS__URL=redis://redis:6379
      - MCP__POSTGRES__URL=postgresql://mcp:${POSTGRES_PASSWORD:-mcp}@postgres:5432/mcp
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8085/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  redis:
    image: redis:7-alpine
    container_name: mcp-redis
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  postgres:
    image: postgres:16-alpine
    container_name: mcp-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: mcp
      POSTGRES_PASSWORD: mcp
      POSTGRES_DB: mcp
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mcp"]
      interval: 10s
      timeout: 3s
      retries: 5
    volumes:
      - postgres_data:/var/lib/postgresql/data

  prometheus:
    image: prom/prometheus:latest
    container_name: mcp-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro

  grafana:
    image: grafana/grafana:latest
    container_name: mcp-grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    depends_on:
      - prometheus

volumes:
  postgres_data:
